<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>KingMidas Support Center</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
</head>
<body>
  <div id="app">載入中...</div>

  <script>
    // 1. 初始化 Mermaid 配置 (放在最前面)
    var num = 0;

    // 2. Docsify 完整配置
    window.$docsify = {
      name: 'KM 技術支援中心',
      repo: 'jerry-yeh-doc/km-support-docs',
      loadSidebar: true,
      subMaxLevel: 2,
      auto2top: true,
      
      // 優化搜尋配置
      search: {
        maxAge: 86400000, // 過期時間，單位毫秒
        paths: 'auto',
        placeholder: '搜尋文件...',
        noData: '找不到結果',
        depth: 6
      },

      // Mermaid 渲染邏輯
      markdown: {
        renderer: {
          code: function(code, lang) {
            if (lang === "mermaid") {
              return (
                '<div class="mermaid">' + code + '</div>'
              );
            }
            return this.origin.code.apply(this, arguments);
          }
        }
      },

      // 插件邏輯：Mermaid 渲染
      plugins: [
        function(hook, vm) {
          hook.doneEach(function() {
            if (window.mermaid) {
              mermaid.init(undefined, '.mermaid');
            }
          });
        }
      ]
    };
  </script>

  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>

  <script>
    // 啟動 Mermaid
    if (window.mermaid) {
      mermaid.initialize({ 
        startOnLoad: false,
        theme: 'forest',
        securityLevel: 'loose'
      });
    }
  </script>
</body>
</html>
