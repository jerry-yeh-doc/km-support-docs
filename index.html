<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>KingMidas Support Center</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
</head>
<body>
  <div id="app">載入中...</div>

  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
  
  <script src="//cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>

  <script>
    // 初始化 Mermaid 配置
    var num = 0;
    mermaid.initialize({ 
	  startOnLoad: false,
	  theme: 'forest',      // <--- 在這裡加入主題
	  securityLevel: 'loose' // 建議加入，增加圖表渲染的相容性
	});

    window.$docsify = {
      name: 'KM 技術支援中心',
      repo: 'jerry-yeh-doc/km-support-docs',
      loadSidebar: true,
      subMaxLevel: 2,
      auto2top: true,
      search: 'auto',
      
      // 核心修復：Mermaid 渲染邏輯
      markdown: {
        renderer: {
          code: function(code, lang) {
            if (lang === "mermaid") {
              return (
                '<div class="mermaid">' + code + '</div>'
              );
            }
            return this.origin.code.apply(this, arguments);
          }
        }
      }
    };

    // 針對 Docsify 的 Mermaid 自動渲染腳本
    window.$docsify.plugins = [
      function(hook, vm) {
        hook.doneEach(function() {
          mermaid.init(undefined, '.mermaid');
        });
      }
    ].concat(window.$docsify.plugins || []);
  </script>
</body>
</html>
